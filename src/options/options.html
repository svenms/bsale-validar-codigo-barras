<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bsale Validar Código Barras - Opciones</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 16px;
        max-width: 520px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 12px 0;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
      }
      .row label {
        flex: 1;
      }
      .muted {
        font-size: 12px;
        color: #666;
      }
      input[type='range'] {
        width: 220px;
      }
      .volume-value {
        min-width: 42px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <h1>Bsale Validar Código Barras</h1>

    <div class="row">
      <label for="from_scratch">
        Activar en `documents/shipping/from_scratch`
      </label>
      <input id="from_scratch" type="checkbox" />
    </div>

    <div class="row">
      <label for="documents_sales">
        Activar en `documents/sales`
      </label>
      <input id="documents_sales" type="checkbox" />
    </div>

    <div class="row">
      <label for="mobile_sales">Activar en `mobile/sales`</label>
      <input id="mobile_sales" type="checkbox" />
    </div>

    <div class="row">
      <label for="volume">Volumen de tonos</label>
      <input id="volume" type="range" min="0" max="100" value="60" />
      <div class="volume-value">
        <span id="volume_label">60</span>%
      </div>
    </div>

    <div class="row">
      <label for="tone_true_preset">Sonido TRUE</label>
      <select id="tone_true_preset">
        <option value="classic">Clasico</option>
        <option value="bell">Campana suave</option>
        <option value="digital">Digital corto</option>
        <option value="arcade">Arcade</option>
        <option value="low_impact">Grave marcado</option>
        <option value="minimal">Minimo y rapido</option>
      </select>
    </div>

    <div class="row">
      <label for="tone_false_preset">Sonido FALSE</label>
      <select id="tone_false_preset">
        <option value="classic">Clasico</option>
        <option value="bell">Campana suave</option>
        <option value="digital">Digital corto</option>
        <option value="arcade">Arcade</option>
        <option value="low_impact">Grave marcado</option>
        <option value="minimal">Minimo y rapido</option>
        <option value="error_siren">Error: Sirena</option>
        <option value="error_triple">Error: Triple</option>
        <option value="error_buzzer">Error: Buzzer</option>
        <option value="error_horn">Error: Bocina</option>
      </select>
    </div>

    <div class="muted">
      Los tonos se reproducen cuando detectamos que el carrito cambió tras el
      `Enter` en el campo `#sale_q`.
    </div>

    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
